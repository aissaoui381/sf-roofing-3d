  <use href="#sa" x="1600" y="40"/>

  <!-- Row 9 y=-30 odd -->
  <use href="#sb" x="-100" y="-30"/><use href="#sa" x="100" y="-30"/>
  <use href="#sb" x="300" y="-30"/><use href="#sa" x="500" y="-30"/>
  <use href="#sb" x="700" y="-30"/><use href="#sa" x="900" y="-30"/>
  <use href="#sb" x="1100" y="-30"/><use href="#sa" x="1300" y="-30"/>
  <use href="#sb" x="1500" y="-30"/>

  <!-- Vignette overlays -->
  <rect width="1600" height="700" fill="url(#vigT)"/>
  <rect width="1600" height="700" fill="url(#vigL)"/>
  <rect width="1600" height="700" fill="url(#vig)"/>
