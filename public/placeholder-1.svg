  <use href="#sa" x="0" y="180"/><use href="#sb" x="200" y="180"/>
  <use href="#sa" x="400" y="180"/><use href="#sb" x="600" y="180"/>
  <use href="#sa" x="800" y="180"/><use href="#sb" x="1000" y="180"/>
  <use href="#sa" x="1200" y="180"/><use href="#sb" x="1400" y="180"/>
  <use href="#sa" x="1600" y="180"/>

