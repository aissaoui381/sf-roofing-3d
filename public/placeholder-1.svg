<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 700">
  <defs>
    <!-- Shingle face gradients (3 variants for natural variation) -->
    <linearGradient id="sf1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#525252"/>
      <stop offset="35%"  stop-color="#3a3a3a"/>
      <stop offset="100%" stop-color="#1c1c1c"/>
    </linearGradient>
    <linearGradient id="sf2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#454545"/>
      <stop offset="35%"  stop-color="#2f2f2f"/>
      <stop offset="100%" stop-color="#161616"/>
    </linearGradient>
    <linearGradient id="sf3" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#5a5a5a"/>
      <stop offset="35%"  stop-color="#424242"/>
      <stop offset="100%" stop-color="#222222"/>
    </linearGradient>
    <!-- Row shadow (overlap edge) -->
    <linearGradient id="rowshadow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#000" stop-opacity="0.75"/>
      <stop offset="100%" stop-color="#000" stop-opacity="0"/>
    </linearGradient>
    <!-- Vignettes -->
    <linearGradient id="vigB" x1="0" y1="0" x2="0" y2="1">
      <stop offset="55%"  stop-color="transparent"/>
      <stop offset="100%" stop-color="#09090b" stop-opacity="0.97"/>
    </linearGradient>
    <linearGradient id="vigT" x1="0" y1="1" x2="0" y2="0">
      <stop offset="72%"  stop-color="transparent"/>
      <stop offset="100%" stop-color="#09090b" stop-opacity="0.55"/>
    </linearGradient>
    <linearGradient id="vigL" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#09090b" stop-opacity="0.85"/>
      <stop offset="28%"  stop-color="transparent"/>
    </linearGradient>
    <!-- Gold ridge -->
    <linearGradient id="ridge" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#f0c96a"/>
      <stop offset="100%" stop-color="#a87020"/>
    </linearGradient>
    <!-- Shingle prototypes (width=200 height=80) -->
    <rect id="s1" width="200" height="80" fill="url(#sf1)"/>
    <rect id="s2" width="200" height="80" fill="url(#sf2)"/>
    <rect id="s3" width="200" height="80" fill="url(#sf3)"/>
    <!-- Top highlight on each shingle -->
    <rect id="sh" width="200" height="3" fill="#6a6a6a" opacity="0.6"/>
    <!-- Tab cut lines -->
    <rect id="tab" width="2" height="28" fill="#0a0a0a" opacity="0.9"/>
    <!-- Row-seam shadow strip (full width) -->
    <rect id="seam" width="1700" height="22" fill="url(#rowshadow)"/>
  </defs>

  <!-- Sky background -->
  <rect width="1600" height="700" fill="#111111"/>

  <!-- ── Shingle rows (bottom → top so upper rows overlap lower) ── -->
  <!-- Exposed height per row: 62px   Total step: 62px   -->
  <!-- Even rows: x=0 offset   Odd rows: x=100 offset (staggered) -->

