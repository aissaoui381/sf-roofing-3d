<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 700">
  <defs>
    <!-- Barrel tile gradient (per-tile, 0→80px userSpaceOnUse within pattern) -->
    <linearGradient id="bg1" x1="0" y1="0" x2="80" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#7c2d12"/>
      <stop offset="20%"  stop-color="#c2410c"/>
      <stop offset="50%"  stop-color="#f97316"/>
      <stop offset="80%"  stop-color="#c2410c"/>
      <stop offset="100%" stop-color="#7c2d12"/>
    </linearGradient>
    <linearGradient id="bg2" x1="0" y1="0" x2="80" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#7c2d12"/>
      <stop offset="20%"  stop-color="#9a3412"/>
      <stop offset="50%"  stop-color="#ea580c"/>
      <stop offset="80%"  stop-color="#9a3412"/>
      <stop offset="100%" stop-color="#7c2d12"/>
    </linearGradient>
    <!-- Pattern: 100px wide (80px barrel + 20px valley), 350px tall (one tile length) -->
    <pattern id="barrel" x="0" y="0" width="100" height="350" patternUnits="userSpaceOnUse">
      <rect width="100" height="350" fill="#450a03"/>
      <rect width="80" height="346" fill="url(#bg1)"/>
      <!-- top edge highlight -->
      <rect x="10" y="0" width="60" height="4" fill="#fb923c" opacity="0.6"/>
    </pattern>
    <pattern id="barrel2" x="0" y="0" width="100" height="350" patternUnits="userSpaceOnUse">
      <rect width="100" height="350" fill="#450a03"/>
      <rect width="80" height="346" fill="url(#bg2)"/>
      <rect x="10" y="0" width="60" height="4" fill="#f97316" opacity="0.4"/>
    </pattern>
    <linearGradient id="vig" x1="0" y1="0" x2="0" y2="1">
      <stop offset="45%" stop-color="transparent"/>
      <stop offset="100%" stop-color="#09090b" stop-opacity="0.95"/>
    </linearGradient>
    <linearGradient id="vigL" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#09090b" stop-opacity="0.75"/>
      <stop offset="30%" stop-color="transparent"/>
    </linearGradient>
    <linearGradient id="vigT" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="transparent"/>
      <stop offset="100%" stop-color="#09090b" stop-opacity="0.45"/>
    </linearGradient>
  </defs>

  <rect width="1600" height="700" fill="#450a03"/>

  <!-- 16 barrel columns alternating two patterns, each 100px wide -->
  <rect x="0"    y="0" width="80" height="700" fill="url(#barrel)"/>
  <rect x="100"  y="0" width="80" height="700" fill="url(#barrel2)"/>
  <rect x="200"  y="0" width="80" height="700" fill="url(#barrel)"/>
  <rect x="300"  y="0" width="80" height="700" fill="url(#barrel2)"/>
  <rect x="400"  y="0" width="80" height="700" fill="url(#barrel)"/>
  <rect x="500"  y="0" width="80" height="700" fill="url(#barrel2)"/>
  <rect x="600"  y="0" width="80" height="700" fill="url(#barrel)"/>
  <rect x="700"  y="0" width="80" height="700" fill="url(#barrel2)"/>
  <rect x="800"  y="0" width="80" height="700" fill="url(#barrel)"/>
  <rect x="900"  y="0" width="80" height="700" fill="url(#barrel2)"/>
  <rect x="1000" y="0" width="80" height="700" fill="url(#barrel)"/>
  <rect x="1100" y="0" width="80" height="700" fill="url(#barrel2)"/>
  <rect x="1200" y="0" width="80" height="700" fill="url(#barrel)"/>
  <rect x="1300" y="0" width="80" height="700" fill="url(#barrel2)"/>
  <rect x="1400" y="0" width="80" height="700" fill="url(#barrel)"/>
  <rect x="1500" y="0" width="80" height="700" fill="url(#barrel2)"/>

  <!-- Horizontal grout lines (tile length divisions) -->
  <rect x="0" y="173" width="1600" height="4" fill="#280601" opacity="0.85"/>
  <rect x="0" y="348" width="1600" height="4" fill="#280601" opacity="0.85"/>
  <rect x="0" y="523" width="1600" height="4" fill="#280601" opacity="0.85"/>

  <!-- Vignette overlays -->
  <rect width="1600" height="700" fill="url(#vigT)"/>
  <rect width="1600" height="700" fill="url(#vigL)"/>
  <rect width="1600" height="700" fill="url(#vig)"/>
</svg>
